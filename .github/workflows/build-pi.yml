name: Build for Raspberry Pi

on:
  push:
    tags:
      - "v*"           # triggers when you push a tag like: git tag v1.0 && git push --tags
  workflow_dispatch:   # also lets you trigger it manually from the GitHub website

jobs:
  build-pi:
    name: Build Linux ARM64 (.deb for Raspberry Pi)
    runs-on: ubuntu-22.04
    permissions:
      contents: write   # required to create GitHub Releases and upload artifacts

    steps:
      # ── 1. Download the repo code ────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Register ARM64 arch and install all native + cross libraries ───────
      - name: Add ARM64 architecture and install dependencies
        run: |
          # Tell APT that this machine will also handle arm64 packages
          sudo dpkg --add-architecture arm64

          # Completely rewrite sources.list to explicitly pin existing entries to
          # amd64 only — this prevents security.ubuntu.com (which has no arm64
          # packages) from being queried for arm64 after we add the architecture.
          sudo tee /etc/apt/sources.list > /dev/null << 'EOF'
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu jammy main restricted universe multiverse
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu jammy-updates main restricted universe multiverse
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu jammy-backports main restricted universe multiverse
          deb [arch=amd64] http://security.ubuntu.com/ubuntu jammy-security main restricted universe multiverse
          EOF

          # Add ARM64-specific sources (Ubuntu Ports hosts all ARM64 packages)
          sudo tee /etc/apt/sources.list.d/arm64.list > /dev/null << 'EOF'
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse
          EOF

          sudo apt-get update

          # Native (x86_64) build tooling
          sudo apt-get install -y \
            build-essential \
            curl wget file patchelf \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu

          # ARM64 versions of every library Tauri links against
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev:arm64 \
            libgtk-3-dev:arm64 \
            libayatana-appindicator3-dev:arm64 \
            librsvg2-dev:arm64 \
            libssl-dev:arm64 \
            libglib2.0-dev:arm64 \
            libcairo2-dev:arm64 \
            libpango1.0-dev:arm64 \
            libgdk-pixbuf-2.0-dev:arm64 \
            libharfbuzz-dev:arm64 \
            libsoup-3.0-dev:arm64 \
            libjavascriptcoregtk-4.1-dev:arm64

      # ── 3. Install Rust and add the ARM64 Linux target ───────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      # ── 4. Cache compiled Rust dependencies (makes future builds faster) ─────
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── 5. Install Node.js (to compile the React frontend) ───────────────────
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ── 6. Install pnpm ───────────────────────────────────────────────────────
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      # ── 7. Cache pnpm modules (makes future builds faster) ───────────────────
      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # ── 8. Install JavaScript dependencies ───────────────────────────────────
      - name: Install JS dependencies
        run: pnpm install

      # ── 9. Build the Tauri app for Raspberry Pi (ARM64 Linux) ────────────────
      - name: Build Tauri app for ARM64
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tell the Rust linker to use the ARM64 cross-compiler
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          # Tell pkg-config to look in the arm64 library paths
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_SYSROOT_DIR: /
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Timeline Kiosk ${{ github.ref_name }}"
          releaseBody: |
            ## Timeline Kiosk Release ${{ github.ref_name }}

            ### Install on Raspberry Pi
            1. Download the `.deb` file below
            2. Open a terminal on your Pi and run:
            ```bash
            sudo dpkg -i timeline-app_*.deb
            ```
            3. Launch the app with:
            ```bash
            timeline-app
            ```
          releaseDraft: false
          prerelease: false
          args: --target aarch64-unknown-linux-gnu --bundles deb

